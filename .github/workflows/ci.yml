name: ci

# Eddy CI locks the apps pillar (ADR 0001 in fram): an eddy app's data can live as Fram
# claims, not SQL — history + scope-correct reasoning + durability for free.

on:
  push:
  pull_request:

jobs:
  # Cheap, dependency-light gates: the claim-store logic + the same semantics on real Fram.
  apps-pillar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. The claim-backed store drop-in (plain JS) — CRUD + history + non-destructive
      #    delete + durable persist/reload, through gen-store's interface.
      - name: claim-store drop-in (node)
        run: node web/runtime/claim-store.test.mjs

      # 2. The same semantics against the REAL Fram engine (bb + committed fram/out).
      - name: Install babashka
        run: curl -sL https://raw.githubusercontent.com/babashka/babashka/master/install | sudo bash
      - name: Checkout fram (the claim engine; out/ is committed)
        uses: actions/checkout@v4
        with:
          repository: tompassarelli/fram
          path: .fram
      - name: eddy-on-claims spike — app data as claims (history + reasoning + durable)
        run: FRAM_OUT="$GITHUB_WORKSPACE/.fram/out" web/spike/eddy-on-claims/run.sh

  # Heavier gate: actually COMPILE a (persist :claims) app through the beagle toolchain
  # and assert codegen emitted the claim-backed store (not the object store). Needs racket
  # + the beagle packages linked (mirrors beagle's own CI), and node for the build step.
  compile-claims:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          architecture: x64
          distribution: full
          variant: CS
          version: '9.1'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Checkout beagle (the .bjs compiler)
        uses: actions/checkout@v4
        with:
          repository: tompassarelli/beagle
          path: .beagle
      - name: Link beagle packages
        run: raco pkg install --auto --link .beagle/beagle-lib/ .beagle/beagle-test/ .beagle/beagle/
      - name: Compile a :claims app and assert the claim-backed store is emitted
        run: |
          cd web
          # IN_NIX_SHELL=1 forces eddy-compile's racket path (skip the nix-develop re-exec).
          IN_NIX_SHELL=1 bin/eddy-compile demo/todo-claims.eddy > /tmp/todo-claims.js
          echo "compiled $(wc -l < /tmp/todo-claims.js) lines"
          grep -q "__tombstoned" /tmp/todo-claims.js || { echo "FAIL: claim store not emitted"; exit 1; }
          ! grep -q "const entities = new Map" /tmp/todo-claims.js || { echo "FAIL: object store leaked into a :claims app"; exit 1; }
          # regression: a :localStorage app still gets the object store, not claims
          IN_NIX_SHELL=1 bin/eddy-compile demo/todo.eddy > /tmp/todo.js
          grep -q "const entities = new Map" /tmp/todo.js || { echo "FAIL: object store missing from :localStorage app"; exit 1; }
          ! grep -q "__tombstoned" /tmp/todo.js || { echo "FAIL: claim store leaked into a :localStorage app"; exit 1; }
          echo "PASS: :claims emits the claim store; :localStorage emits the object store"
          # emit-mcp: the schema -> MCP tool catalog projection must emit valid JSON with the CRUD tools
          IN_NIX_SHELL=1 bin/eddy-compile --mcp demo/todo-claims.eddy > /tmp/mcp.json
          python3 -c "import json; d=json.load(open('/tmp/mcp.json')); ns=[t['name'] for t in d['tools']]; assert 'task.create' in ns and 'task.list' in ns, ns; print('PASS: emit-mcp catalog valid —', len(d['tools']), 'tools')"
