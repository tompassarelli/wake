<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fleet Observatory — wake dogfood</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/geist@1/index.min.css">
  <link rel="stylesheet" href="../dist.css">
</head>
<body>
  <div id="app"></div>

  <!-- SHELL STUB (stands in for framescope): defines the custom panes wake mounts via
       (panel … :mount "framescope.mountX"). Each receives { el, wake } and shares the SAME
       /presence feed + selection bus as the wake entity-view. framescope swaps real
       Cytoscape/stream renderers in here; the seam (el + window.wake) is unchanged. -->
  <script>
    window.framescope = window.framescope || {};
    function _pane(el, title) {
      el.style.cssText = 'border:1px solid var(--border,#ccc);border-radius:8px;margin:12px;padding:12px;background:var(--muted,#f4f4f5)';
      const h = document.createElement('div');
      h.style.cssText = 'font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted-foreground,#666);margin-bottom:6px';
      h.textContent = title;
      const body = document.createElement('div');
      body.style.cssText = 'font-size:13px;color:var(--foreground,#111)';
      el.appendChild(h); el.appendChild(body);
      return body;
    }
    window.framescope.mountGraph = ({ el, wake }) => {
      const body = _pane(el, 'framescope · agent graph (Cytoscape pane)');
      const render = () => {
        const rows = wake && wake.stores && wake.stores.agents ? wake.stores.agents.all() : [];
        const sel = wake && wake.selection ? wake.selection.get() : null;
        body.textContent = `▣ ${rows.length} nodes from shared feed` + (sel ? ` · selected ${sel}` : '');
      };
      render();
      if (wake && wake.feed) wake.feed.onUpdate(({ changed }) => { body.dataset.lastDelta = (changed||[]).length; render(); });
    };
    window.framescope.mountStream = ({ el, wake }) => {
      const body = _pane(el, 'framescope · live stream-tail');
      let n = 0;
      const line = (t) => { const d = document.createElement('div'); d.style.cssText='font-family:monospace;font-size:11px'; d.textContent = t; body.prepend(d); while (body.childElementCount > 4) body.lastChild.remove(); };
      line('stream attached to window.wake.feed');
      if (wake && wake.feed) wake.feed.onUpdate(({ name, changed }) => { line(`Δ ${name}: ${(changed||[]).length} row(s) moved  [#${++n}]`); });
    };
  </script>

  <script src="fleet-app.js"></script>
</body>
</html>
